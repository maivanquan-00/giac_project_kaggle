data:
  data_dir:  "/kaggle/input/datasets/maivanquan/datn-2025-2/data_final"
  graph_dir: "/kaggle/input/datasets/maivanquan/datn-2025-2/Heterogeneous_Graph"
  cancer_types: ["COAD", "ESCA", "READ", "STAD"]

preprocessing:
  gene_top_k:   3500
  meth_top_k:   3500
  mirna_top_k:  1881
  feature_selection_method: "anova"
  val_size:  0.15
  cv_folds:  5
  minority_boost_gene:  200
  minority_boost_meth:  150
  minority_boost_mirna: 0
  minority_classes: [1, 3]

graph:
  emqtl_pval_threshold:    0.05
  max_edges_per_node:      20
  max_coregulation_edges:  10
  ppi_score_threshold:     700
  use_ppi:          true
  use_reactome:     true
  use_mirna:        true
  use_mirna_family: true
  reactome_max_pathway_size: 50

model:
  hidden_dim:  64
  gat_heads:   4
  gat_layers:  2
  gat_dropout: 0.5
  topk_seq:    32        # K tokens per modality fed to cross-attention as K/V
  ca_heads:    4
  ca_dropout:  0.4
  sparsemax_alpha: 1.5   # entmax15
  num_classes: 5
  classifier_dropout: 0.5
  final_dim:   32

training:
  epochs:      150
  batch_size:  32
  learning_rate:     1.0e-4
  max_learning_rate: 5.0e-4
  scheduler: "onecycle"
  onecycle_pct_start:        0.1
  onecycle_div_factor:       10.0
  onecycle_final_div_factor: 100.0
  weight_decay:          3.0e-3
  node_emb_weight_decay: 1.5e-2
  focal_gamma:     2.0
  focal_alpha:     [1.0, 4.5, 1.5, 8.0, 2.0]
  label_smoothing: 0.05
  balanced_sampler: false
  lambda_frobenius: 0.001
  patience: 20
  model_selection_metric: "val_f1"
  seed: 42
  loss_name: "focal"

logging:
  save_dir:     "/kaggle/working/checkpoints/"
  log_interval: 5

interpretability:
  top_k_features: 50