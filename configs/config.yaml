# ============================================================
#  Toàn bộ hyperparameter của project
# ============================================================

data:
  # ── Đường dẫn data_final ──────────────────────────────
  data_dir: "/kaggle/input/datasets/maivanquan/datn-2025-2/data_final"
  #   final_labels.csv          : Patient_ID, Cancer_Type, Clean_Subtype, Target_Label
  #   final_gene.csv            : index=Patient_ID, columns=gene_names
  #   final_methylation.csv     : index=Patient_ID, columns=CpG_names
  #   final_mirna.csv           : index=Patient_ID, columns=miRNA_names

  # ── Đường dẫn Heterogeneous Graph ─────────────────────────
  graph_dir: "/kaggle/input/datasets/maivanquan/datn-2025-2/Heterogeneous_Graph"
  #   graph_dir/
  #     9606.protein.links.v12.0.txt    ← STRING PPI
  #     9606.protein.aliases.v12.0.txt  ← map ENSP → gene symbol
  #     9606.protein.info.v12.0.txt     ← gene info (backup mapping)
  #     hsa_MTI.csv                     ← miRTarBase (miRNA → gene)
  #     GIAC_main/
  #       TCGA_emQTL_COAD.txt
  #       TCGA_emQTL_ESCA.txt
  #       TCGA_emQTL_READ.txt
  #       TCGA_emQTL_STAD.txt
  #       TCGA_hallmark_pathway_meQTL_COAD.txt  (chưa có cũng không sao)
  #       TCGA_hallmark_pathway_meQTL_ESCA.txt
  #       TCGA_hallmark_pathway_meQTL_READ.txt
  #       TCGA_hallmark_pathway_meQTL_STAD.txt

  cancer_types: ["COAD", "ESCA", "READ", "STAD"]

preprocessing:
  gene_top_k: 3000
  meth_top_k: 3000
  mirna_top_k: 1881
  feature_selection_method: "anova"
  val_size: 0.1
  cv_folds: 5
 
graph:
  emqtl_pval_threshold: 0.05
  max_edges_per_node: 50
  max_coregulation_edges: 20   # CpG↔miRNA co-regulation edges per node
  # STRING PPI: chỉ lấy cạnh có combined_score >= ngưỡng này
  ppi_score_threshold: 700
  use_ppi: true       # bật vì đã có file STRING
  use_mirna: true     # bật vì đã có hsa_MTI.csv
 
model:
  hidden_dim: 128
  gat_heads: 4
  gat_layers: 2
  gat_dropout: 0.6          # B3: tăng từ 0.4
  cross_attn_heads: 8       # giữ (không dùng nữa nhưng không xóa để tránh lỗi load ckpt)
  sparsemax_alpha: 1.5
  modality_temperature: 1.0
  cross_attn_dropout: 0.5   # B3: tăng từ 0.4
  gate_dropout: 0.6         # B1: dropout cho Gated Fusion MLP
  num_classes: 5
  classifier_dropout: 0.5   # B3: tăng từ 0.5 (giữ nguyên, đã ổn)
  final_dim: 64
 
training:
  epochs: 150
  batch_size: 32
  learning_rate: 1.0e-4
  max_learning_rate: 5.0e-4
  scheduler: "onecycle"
  onecycle_pct_start: 0.1
  onecycle_div_factor: 10.0
  onecycle_final_div_factor: 100.0
  weight_decay: 1.0e-2   # D: revert từ 5e-2 → WD quá cao làm gate MLP collapse về uniform
  test_size: 0.2
  focal_gamma: 3.0       # Tăng từ 2.0 -> 3.0 để trừng phạt càng mạnh các ca dễ
  focal_alpha: 1.0
  label_smoothing: 0.05  # D: revert từ 0.10 → 0.10 quá cao làm gradient yếu giai đoạn đầu
  lambda_modality: 0.00  # không dùng sau B1 (không còn cross-attention)
  lambda_frobenius: 0.01
  lambda_entropy: 0.00    # penalty gate collapse, >0.01 đủ mạnh  # khôi phục: giữ gate weights ổn định
  patience: 15           # D: tăng từ 10 → 15 (giữa 20 quá dài và 10 quá ngắn)
  seed: 42
  loss_name: "focal"
 
logging:
  save_dir: "/kaggle/working/checkpoints/"
  log_interval: 5
 
interpretability:
  top_k_features: 50