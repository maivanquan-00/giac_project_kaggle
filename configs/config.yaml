# ============================================================
#  Toan bo hyperparameter cua project
#  Phase 22 -- Additive residual fusion + tuned minority focal
# ============================================================

data:
  data_dir: "/kaggle/input/datasets/maivanquan/datn-2025-2/data_final"
  graph_dir: "/kaggle/input/datasets/maivanquan/datn-2025-2/Heterogeneous_Graph"
  cancer_types: ["COAD", "ESCA", "READ", "STAD"]

preprocessing:
  gene_top_k: 3500
  meth_top_k: 3500
  mirna_top_k: 1881
  feature_selection_method: "anova"
  val_size: 0.1
  cv_folds: 5
  # Minority-class stratified boost (Phase 20 new)
  # Binary ANOVA (class c vs rest) for each minority class.
  # Top-N features merged (union) into main set. Actual dims = top_k + unique extras.
  minority_boost_gene: 300
  minority_boost_meth: 300
  minority_boost_mirna: 0
  minority_classes: [1, 3]   # GS=class1, HM-SNV=class3

graph:
  emqtl_pval_threshold: 0.05
  max_edges_per_node: 20
  max_coregulation_edges: 10
  ppi_score_threshold: 700
  use_ppi: true
  use_mirna: true

model:
  hidden_dim: 128
  gat_heads: 4
  gat_layers: 1
  gat_dropout: 0.4
  cross_attn_heads: 8
  sparsemax_alpha: 1.5
  modality_temperature: 1.0
  cross_attn_dropout: 0.5
  gate_dropout: 0.3
  num_classes: 5
  classifier_dropout: 0.5
  final_dim: 64

training:
  epochs: 150
  batch_size: 32
  learning_rate: 1.0e-4
  max_learning_rate: 5.0e-4
  scheduler: "onecycle"
  onecycle_pct_start: 0.1
  onecycle_div_factor: 10.0
  onecycle_final_div_factor: 100.0
  weight_decay: 1.0e-3
  test_size: 0.2
  focal_gamma: 2.0
  focal_alpha: [1.0, 3.0, 1.5, 5.0, 3.0]
  label_smoothing: 0.05
  lambda_modality: 0.00
  lambda_frobenius: 0.01
  lambda_entropy: 0.00
  patience: 20
  seed: 42
  loss_name: "focal"

logging:
  save_dir: "/kaggle/working/checkpoints/"
  log_interval: 5

interpretability:
  top_k_features: 50