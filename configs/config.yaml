# ============================================================
#  Toàn bộ hyperparameter của project
# ============================================================

data:
  # ── Đường dẫn data_final ──────────────────────────────
  data_dir: "/kaggle/input/datasets/maivanquan/datn-2025-2/data_final"
  #   final_labels.csv          : Patient_ID, Cancer_Type, Clean_Subtype, Target_Label
  #   final_gene.csv            : index=Patient_ID, columns=gene_names
  #   final_methylation.csv     : index=Patient_ID, columns=CpG_names
  #   final_mirna.csv           : index=Patient_ID, columns=miRNA_names

  # ── Đường dẫn Heterogeneous Graph ─────────────────────────
  graph_dir: "/kaggle/input/datasets/maivanquan/datn-2025-2/Heterogeneous_Graph"
  #   graph_dir/
  #     9606.protein.links.v12.0.txt    ← STRING PPI
  #     9606.protein.aliases.v12.0.txt  ← map ENSP → gene symbol
  #     9606.protein.info.v12.0.txt     ← gene info (backup mapping)
  #     hsa_MTI.csv                     ← miRTarBase (miRNA → gene)
  #     GIAC_main/
  #       TCGA_emQTL_COAD.txt
  #       TCGA_emQTL_ESCA.txt
  #       TCGA_emQTL_READ.txt
  #       TCGA_emQTL_STAD.txt
  #       TCGA_hallmark_pathway_meQTL_COAD.txt  (chưa có cũng không sao)
  #       TCGA_hallmark_pathway_meQTL_ESCA.txt
  #       TCGA_hallmark_pathway_meQTL_READ.txt
  #       TCGA_hallmark_pathway_meQTL_STAD.txt

  cancer_types: ["COAD", "ESCA", "READ", "STAD"]

graph:
  emqtl_pval_threshold: 0.05
  max_edges_per_node: 50
  # STRING PPI: chỉ lấy cạnh có combined_score >= ngưỡng này
  ppi_score_threshold: 700
  use_ppi: true       # bật vì đã có file STRING
  use_mirna: true     # bật vì đã có hsa_MTI.csv

model:
  hidden_dim: 128
  gat_heads: 4
  gat_layers: 2
  gat_dropout: 0.3
  cross_attn_heads: 8
  sparsemax_alpha: 1.0
  cross_attn_dropout: 0.4
  num_classes: 5        # CIN=0, GS=1, MSI=2, HM-SNV=3, EBV=4
  classifier_dropout: 0.5
  final_dim: 64

training:
  epochs: 100
  batch_size: 32
  learning_rate: 5.0e-5
  weight_decay: 5.0e-5
  test_size: 0.2
  focal_gamma: 2.0
  focal_alpha: 1.0
  lambda_modality: 0.01
  lambda_frobenius: 0.01
  patience: 15
  seed: 42

logging:
  save_dir: "/kaggle/working/checkpoints/"
  log_interval: 5

interpretability:
  top_k_features: 50
